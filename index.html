<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>펫 가이드</title>
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --paper:#fffdf8;
      --card:#ffffff;
      --ink:#20130b;
      --muted:#66584f;
      --faint:#9b8d81;
      --line:#eadfd4;
      --dog-primary:#d86f34;
      --dog-soft:#fff0e4;
      --dog-deep:#8f4017;
      --cat-primary:#7c68aa;
      --cat-soft:#f3efff;
      --cat-deep:#4d3a79;
      --section-primary:var(--dog-primary);
      --section-soft:var(--dog-soft);
      --section-deep:var(--dog-deep);
      --radius:24px;
      --shadow-card:0 14px 36px rgba(55, 38, 22, .12);
    }
    body.cat-mode { --section-primary:var(--cat-primary); --section-soft:var(--cat-soft); --section-deep:var(--cat-deep); }
    * { box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      margin:0;
      min-height:100vh;
      font-family:'Noto Sans KR', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color:var(--ink);
      background:radial-gradient(circle at top, var(--section-soft), var(--paper) 38%, #fffaf1 100%);
      overflow-x:hidden;
    }
    button, input { font:inherit; }
    header {
      position:sticky;
      top:0;
      z-index:70;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:12px;
      min-height:106px;
      padding:14px 18px 12px;
      border-bottom:1px solid var(--line);
      background:rgba(255,253,248,.94);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
    }
    .logo {
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      font-family:'Noto Serif KR', serif;
      font-weight:900;
      font-size:1.42rem;
      letter-spacing:-.05em;
      text-align:center;
    }
    .logo img { width:36px; height:36px; border-radius:12px; box-shadow:0 8px 18px rgba(0,0,0,.12); }
    button.logo {
      border:1px solid var(--line);
      background:#fff;
      padding:8px 18px 8px 10px;
      border-radius:999px;
      cursor:pointer;
      box-shadow:0 8px 22px rgba(0,0,0,.07);
      transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease, background .18s ease;
    }
    button.logo:hover { transform:translateY(-2px); box-shadow:0 12px 28px rgba(0,0,0,.12); border-color:var(--section-primary); }
    button.logo:focus-visible { outline:3px solid var(--section-soft); outline-offset:3px; }
    .check-progress {
      max-width:780px;
      margin:0 auto 22px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:18px;
      box-shadow:0 10px 30px rgba(0,0,0,.055);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
    }
    .check-progress strong { color:var(--section-deep); font-size:1rem; }
    .progress-track { flex:1 1 240px; height:10px; border-radius:999px; background:var(--section-soft); overflow:hidden; }
    .progress-fill { height:100%; width:0%; border-radius:999px; background:var(--section-primary); transition:width .2s ease; }
    .reset-checks {
      border:1px solid var(--line);
      background:#fff;
      color:var(--muted);
      border-radius:999px;
      padding:9px 13px;
      font-weight:900;
      cursor:pointer;
    }
    .checklist-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:16px; margin-top:18px; }
    .check-card {
      background:rgba(255,255,255,.94);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:22px;
      box-shadow:0 10px 30px rgba(0,0,0,.055);
    }
    .check-card h3 { font-family:'Noto Serif KR', serif; text-align:center; color:var(--section-deep); font-size:1.2rem; letter-spacing:-.05em; margin-bottom:4px; }
    .check-card p { color:var(--muted); line-height:1.65; text-align:center; font-size:.88rem; margin:0 0 14px; }
    .check-items { display:grid; gap:10px; }
    .check-row {
      display:flex;
      align-items:flex-start;
      gap:10px;
      background:var(--section-soft);
      border:1px solid rgba(255,255,255,.72);
      border-radius:16px;
      padding:12px;
      cursor:pointer;
      color:var(--muted);
      line-height:1.58;
      font-size:.9rem;
      font-weight:700;
    }
    .check-row input { width:18px; height:18px; margin-top:2px; accent-color:var(--section-primary); flex:0 0 auto; }
    .check-row:has(input:checked) { background:#fff; border-color:var(--section-primary); color:var(--section-deep); text-decoration:none; }

    nav { display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap; }
    .nav-btn, .tab-btn, .chip, .detail-close, .back-to-top {
      border:0;
      cursor:pointer;
      font-weight:900;
      letter-spacing:-.03em;
      transition:transform .18s ease, box-shadow .18s ease, background .18s ease, color .18s ease, border-color .18s ease;
    }
    .nav-btn {
      padding:10px 22px;
      border-radius:999px;
      background:#fff;
      color:var(--muted);
      border:1px solid var(--line);
      box-shadow:0 6px 16px rgba(0,0,0,.04);
    }
    .nav-btn.active {
      background:var(--section-primary);
      color:#fff;
      border-color:var(--section-primary);
      box-shadow:0 10px 26px rgba(0,0,0,.14);
      transform:translateY(-1px);
    }
    .hero { position:relative; text-align:center; padding:70px 20px 54px; overflow:hidden; }
    .hero::before {
      content:"";
      position:absolute;
      inset:0;
      background-image:radial-gradient(circle, rgba(0,0,0,.055) 1px, transparent 1px);
      background-size:24px 24px;
      opacity:.5;
      pointer-events:none;
    }
    .hero-inner { position:relative; max-width:980px; margin:0 auto; display:flex; flex-direction:column; align-items:center; }
    .hero-badge {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:9px 16px;
      border-radius:999px;
      background:#fff;
      color:var(--section-primary);
      font-weight:900;
      box-shadow:0 8px 24px rgba(0,0,0,.08);
      margin-bottom:18px;
    }
    .hero-emoji { font-size:5rem; filter:drop-shadow(0 16px 26px rgba(0,0,0,.14)); animation:floatPet 3.2s ease-in-out infinite; line-height:1; }
    @keyframes floatPet { 0%,100% { transform:translateY(0) rotate(-2deg); } 50% { transform:translateY(-12px) rotate(2deg); } }
    h1, h2, h3 { margin:0; }
    h1 {
      font-family:'Noto Serif KR', serif;
      font-weight:900;
      color:var(--section-primary);
      font-size:clamp(2.15rem,5.2vw,4.45rem);
      line-height:1.1;
      letter-spacing:-.07em;
      margin-top:18px;
      text-align:center;
    }
    .hero-desc { max-width:700px; margin:18px auto 0; color:var(--muted); font-size:1.08rem; line-height:1.8; font-weight:500; text-align:center; }
    .summary-strip { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; width:100%; max-width:980px; margin:30px auto 0; }
    .summary-pill { background:rgba(255,255,255,.88); border:1px solid var(--line); border-radius:18px; padding:14px 12px; text-align:center; box-shadow:0 8px 24px rgba(0,0,0,.06); }
    .summary-pill strong { display:block; color:var(--section-deep); font-size:.92rem; margin-bottom:4px; }
    .summary-pill span { color:var(--muted); font-size:.78rem; line-height:1.45; }
    .section-nav {
      position:sticky;
      top:var(--header-height, 106px);
      z-index:65;
      display:flex;
      gap:8px;
      justify-content:center;
      overflow-x:auto;
      padding:14px 18px 13px;
      background:rgba(255,253,248,.96);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border-bottom:1px solid var(--line);
      scrollbar-width:none;
    }
    .section-nav::-webkit-scrollbar { display:none; }
    .tab-btn {
      flex:0 0 auto;
      padding:11px 16px;
      border-radius:999px;
      color:var(--muted);
      background:#fff;
      border:1px solid var(--line);
      white-space:nowrap;
    }
    .tab-btn:hover, .nav-btn:hover, .chip:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,0,0,.09); }
    .tab-btn.active { color:#fff; background:var(--section-primary); border-color:var(--section-primary); box-shadow:0 8px 22px rgba(0,0,0,.13); }
    main { scroll-margin-top:calc(var(--header-height, 106px) + var(--section-nav-height, 64px) + 14px); max-width:1180px; margin:0 auto; padding:46px clamp(18px,4vw,42px) 90px; }
    .section-header { text-align:center; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; margin:0 auto 30px; }
    .section-icon { width:70px; height:70px; border-radius:24px; background:var(--section-soft); display:flex; align-items:center; justify-content:center; font-size:2rem; box-shadow:inset 0 0 0 1px var(--line); }
    .kicker { color:var(--section-primary); font-weight:900; font-size:.92rem; letter-spacing:-.02em; text-align:center; }
    h2 { font-family:'Noto Serif KR', serif; font-size:clamp(1.55rem,3.6vw,2.45rem); line-height:1.24; letter-spacing:-.06em; text-align:center; }
    .lead { max-width:780px; margin:0 auto 26px; color:var(--muted); line-height:1.75; text-align:center; font-weight:500; }
    .source-box, .notice, .loading-card { background:linear-gradient(135deg,#fff,var(--section-soft)); border:1px solid var(--line); border-radius:var(--radius); padding:22px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,.055); margin-bottom:24px; color:var(--muted); line-height:1.7; }
    .source-box strong, .notice strong { color:var(--section-deep); }
    .feature-grid, .info-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:16px; }
    .info-grid { grid-template-columns:repeat(2,minmax(0,1fr)); margin-top:18px; }
    .feature-card, .info-card, .breed-list-card, .breed-detail-card {
      background:rgba(255,255,255,.94);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:22px;
      box-shadow:0 10px 30px rgba(0,0,0,.055);
      transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    }
    .feature-card:hover, .info-card:hover, .breed-list-card:hover { transform:translateY(-4px); box-shadow:var(--shadow-card); border-color:var(--section-primary); }
    .feature-card { text-align:center; display:flex; flex-direction:column; align-items:center; }
    .feature-emoji { font-size:2.4rem; margin-bottom:10px; }
    .feature-card h3 { font-size:1rem; letter-spacing:-.04em; text-align:center; }
    .tag { display:inline-flex; align-items:center; justify-content:center; margin:10px auto 12px; padding:5px 11px; border-radius:999px; background:var(--section-soft); color:var(--section-primary); font-size:.74rem; font-weight:900; text-align:center; }
    .feature-card p { color:var(--muted); line-height:1.65; font-size:.88rem; text-align:center; }
    .breed-tools { display:flex; align-items:center; justify-content:center; gap:12px; margin:30px auto 18px; flex-wrap:wrap; }
    .breed-tools input { width:min(100%,420px); border:1px solid var(--line); background:#fff; border-radius:999px; padding:14px 18px; font-weight:800; outline:none; text-align:center; box-shadow:0 8px 24px rgba(0,0,0,.05); }
    .breed-tools input:focus { border-color:var(--section-primary); box-shadow:0 0 0 4px rgba(216,111,52,.12); }
    body.cat-mode .breed-tools input:focus { box-shadow:0 0 0 4px rgba(124,104,170,.12); }
    .count-pill { padding:12px 16px; border-radius:999px; background:var(--section-primary); color:white; font-size:.86rem; font-weight:900; }
    .breed-list { display:grid; grid-template-columns:1fr; gap:18px; }
    .breed-list-card { padding:24px; }
    .breed-list-card h3 { text-align:center; font-family:'Noto Serif KR', serif; font-size:1.24rem; color:var(--section-deep); margin-bottom:8px; letter-spacing:-.04em; }
    .breed-list-card p { color:var(--muted); line-height:1.65; text-align:center; max-width:820px; margin:0 auto 16px; font-size:.9rem; }
    .chips { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; }
    .chip { display:inline-flex; align-items:center; justify-content:center; padding:8px 12px; border-radius:999px; background:var(--section-soft); color:var(--section-deep); font-size:.8rem; border:1px solid rgba(0,0,0,.04); }
    .chip.active { background:var(--section-primary); color:#fff; }
    .breed-detail-card { position:relative; margin:18px auto 0; max-width:880px; background:#fff; border-color:var(--section-primary); }
    .detail-close { position:absolute; top:12px; right:12px; width:34px; height:34px; border-radius:50%; background:var(--section-soft); color:var(--section-deep); font-size:1.2rem; }
    .breed-detail-card h4 { margin:0 40px 12px; text-align:center; font-family:'Noto Serif KR', serif; font-size:1.42rem; letter-spacing:-.05em; color:var(--section-deep); }
    .breed-detail-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
    .breed-fact { background:var(--section-soft); border-radius:16px; padding:14px; line-height:1.65; }
    .breed-fact strong { display:block; margin-bottom:4px; color:var(--section-deep); }
    .breed-fact span { color:var(--muted); font-size:.9rem; }
    .card-head { display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:9px; margin-bottom:16px; }
    .card-icon { width:54px; height:54px; border-radius:18px; background:var(--section-soft); display:flex; align-items:center; justify-content:center; font-size:1.55rem; }
    .card-title { font-family:'Noto Serif KR', serif; font-size:1.18rem; font-weight:900; text-align:center; letter-spacing:-.04em; }
    .card-subtitle { color:var(--faint); font-size:.82rem; font-weight:800; text-align:center; margin-top:2px; }
    .item-list { display:grid; gap:10px; }
    .list-item { display:flex; align-items:flex-start; gap:10px; padding:12px; border-radius:16px; background:var(--section-soft); border:1px solid rgba(255,255,255,.65); }
    .list-item .dot { flex:0 0 auto; width:24px; height:24px; display:flex; align-items:center; justify-content:center; border-radius:50%; background:#fff; color:var(--section-primary); font-size:.82rem; margin-top:1px; }
    .list-item strong { display:block; color:var(--ink); font-size:.92rem; margin-bottom:3px; letter-spacing:-.03em; }
    .list-item span.txt { color:var(--muted); line-height:1.62; font-size:.87rem; }

    .quiz-toolbar {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:18px 20px;
      box-shadow:0 10px 30px rgba(0,0,0,.055);
      margin-bottom:18px;
      text-align:left;
    }
    .quiz-toolbar strong { display:block; color:var(--section-deep); font-size:1.02rem; margin-bottom:3px; }
    .quiz-toolbar span { color:var(--muted); font-size:.88rem; line-height:1.55; }
    .reset-quiz, .submit-quiz, .download-result, .quiz-nav-btn {
      border:0;
      cursor:pointer;
      border-radius:999px;
      background:var(--section-primary);
      color:#fff;
      font-weight:900;
      letter-spacing:-.03em;
      box-shadow:0 10px 24px rgba(0,0,0,.13);
      transition:transform .18s ease, box-shadow .18s ease;
    }
    .reset-quiz { padding:10px 16px; flex:0 0 auto; }
    .submit-quiz { padding:15px 26px; font-size:1rem; }
    .download-result { padding:12px 17px; align-self:center; }
    .reset-quiz:hover, .submit-quiz:hover, .download-result:hover, .quiz-nav-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 14px 30px rgba(0,0,0,.18); }
    .quiz-alert {
      background:#fff4e5;
      border:1px solid #f3c88b;
      color:#8f4017;
      border-radius:18px;
      padding:13px 16px;
      text-align:center;
      font-weight:900;
      margin:0 0 18px;
    }

    .quiz-step-shell {
      background:#fff;
      border:1px solid var(--line);
      border-radius:30px;
      padding:22px;
      box-shadow:0 10px 30px rgba(0,0,0,.055);
      margin-bottom:22px;
    }
    .quiz-step-head {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
      text-align:center;
    }
    .quiz-progress-main {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:112px;
      padding:9px 14px;
      border-radius:999px;
      background:var(--section-primary);
      color:#fff;
      font-weight:900;
      letter-spacing:-.03em;
      box-shadow:0 8px 18px rgba(0,0,0,.12);
    }
    .quiz-progress-sub {
      color:var(--section-deep);
      font-weight:900;
      letter-spacing:-.03em;
      padding:8px 0;
    }
    .quiz-progress-track {
      width:100%;
      height:10px;
      background:var(--section-soft);
      border-radius:999px;
      overflow:hidden;
      margin-bottom:18px;
      border:1px solid rgba(0,0,0,.03);
    }
    .quiz-progress-fill {
      height:100%;
      background:linear-gradient(90deg,var(--section-primary),var(--section-deep));
      border-radius:999px;
      transition:width .22s ease;
    }
    .quiz-step-form { gap:14px; }
    .quiz-single-card {
      box-shadow:none;
      border-color:rgba(0,0,0,.075);
      background:linear-gradient(180deg,#fff 0%, rgba(255,255,255,.92) 100%);
    }
    .quiz-step-actions {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding-top:2px;
    }
    .quiz-nav-btn {
      padding:13px 22px;
      font-size:.98rem;
      background:#fff;
      color:var(--section-deep);
      border:1px solid var(--line);
      box-shadow:0 8px 20px rgba(0,0,0,.08);
    }
    .quiz-nav-btn.next {
      margin-left:auto;
      background:var(--section-primary);
      color:#fff;
      border-color:var(--section-primary);
    }
    .quiz-nav-btn:disabled {
      opacity:.45;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
    }

    .quiz-form { display:grid; gap:16px; }
    .quiz-card {
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:#fff;
      padding:22px;
      box-shadow:0 10px 30px rgba(0,0,0,.055);
      margin:0;
      min-width:0;
    }
    .quiz-card legend {
      width:100%;
      float:left;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      gap:10px;
      text-align:center;
      font-family:'Noto Serif KR', serif;
      font-weight:900;
      font-size:1.08rem;
      line-height:1.48;
      letter-spacing:-.04em;
      color:var(--ink);
      margin-bottom:8px;
    }
    .quiz-card legend span {
      flex:0 0 auto;
      min-width:34px;
      height:34px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:50%;
      background:var(--section-soft);
      color:var(--section-primary);
      font-family:'Noto Sans KR', sans-serif;
      font-size:.82rem;
    }
    .quiz-card legend + * { clear:both; }
    .quiz-category {
      width:max-content;
      max-width:100%;
      margin:0 auto 14px;
      padding:5px 11px;
      border-radius:999px;
      background:var(--section-soft);
      color:var(--section-deep);
      font-size:.78rem;
      font-weight:900;
    }
    .quiz-options { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
    .quiz-option {
      display:flex;
      align-items:flex-start;
      gap:10px;
      padding:13px 14px;
      border:1px solid var(--line);
      border-radius:17px;
      background:var(--section-soft);
      color:var(--muted);
      font-weight:800;
      line-height:1.55;
      cursor:pointer;
      min-width:0;
    }
    .quiz-option input {
      width:18px;
      height:18px;
      margin-top:3px;
      flex:0 0 auto;
      accent-color:var(--section-primary);
    }
    .quiz-option:has(input:checked) { background:#fff; border-color:var(--section-primary); color:var(--section-deep); box-shadow:inset 0 0 0 1px var(--section-primary); }
    .quiz-option.correct { background:#ecfff0; border-color:#7cc58b; color:#225c2c; }
    .quiz-option.wrong { background:#fff0f0; border-color:#e08a8a; color:#8c2424; }
    .quiz-explain {
      clear:both;
      margin:14px 0 0;
      padding:13px 14px;
      border-radius:16px;
      background:#fffaf1;
      border:1px dashed var(--line);
      color:var(--muted);
      line-height:1.65;
      font-size:.9rem;
      text-align:left;
    }
    .quiz-explain strong { color:var(--section-deep); margin-right:6px; }
    .quiz-submit-wrap { text-align:center; padding:10px 0 6px; }
    .quiz-result {
      display:grid;
      grid-template-columns:auto minmax(0,1fr) auto;
      align-items:center;
      gap:18px;
      margin:28px 0 18px;
